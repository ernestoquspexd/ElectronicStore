<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validación de Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .centrado {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .formato {
            width: 450px;
            color: #e9e5e5;
            border-radius: 10px;
            background-color: #000000;
            padding: 20px;
        }

        .body {
            background: linear-gradient(135deg, #ffff01 0%, #db360d 100%);
            min-height: 100vh;
            margin: 0;
        }    
    </style>

    <script>
        window.onload = function () {
            document.querySelector("#formulario").addEventListener("submit", function (event) {
                event.preventDefault();
                let valido = true;

                const nombreRegex = /^[A-Za-z]+$/;
                const nombre = document.getElementById("nombre");
                if (!nombreRegex.test(nombre.value)) {
                    alert("Nombre inválido. Solo letras, sin espacios ni números.");
                    valido = false;
                }

                const correoRegex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;
                const correo = document.getElementById("correo");
                if (!correoRegex.test(correo.value)) {
                    alert("Correo inválido. Ejemplo válido: usuario@dominio.com");
                    valido = false;
                }

                const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
                const password = document.getElementById("password");
                if (!passwordRegex.test(password.value)) {
                    alert("Contraseña inválida. Debe tener al menos 8 caracteres, incluir mayúsculas, minúsculas, números y símbolos.");
                    valido = false;
                }

                if (valido) {
                    alert("Formulario enviado correctamente");
                }
            }, false);
        }
    </script>
</head>

<body class="body">
    <a href="index.html" class="btn btn-dark me-3">&larr; Volver</a>
    <div class="centrado">
        <form id="formulario" class="formato">
            <p class="fs-3">Registro de Cliente</p>

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre del cliente:</label>
                <input type="text" class="form-control" id="nombre" name="nombre"
                    placeholder="Nombre completo sin espacios" required>
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico:</label>
                <input type="email" class="form-control" id="correo" name="correo" placeholder="usuario@dominio.com"
                    required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input type="password" class="form-control" id="password" name="password"
                    placeholder="Debe tener mayúsculas y numeros, max 8 caracteres" required>
            </div>

            <button type="submit" class="btn btn-warning">Registrar</button>
        </form>
    </div>
</body>

</html>
